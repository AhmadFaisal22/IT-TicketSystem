server {
    listen 80;
    server_name _;

    # ── Vue SPA ────────────────────────────────────────────
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Laravel API ────────────────────────────────────────
    location ~ ^/api/ {
        # Resolve the app container per-request via Docker's DNS;
        # a literal hostname is resolved once at startup, so a stale
        # IP after `docker compose up --force-recreate` causes 502s.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $fastcgi_backend app;
        fastcgi_pass $fastcgi_backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param QUERY_STRING    $query_string;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        fastcgi_param HTTP_HOST       $host;
        fastcgi_param HTTPS           on;
        fastcgi_read_timeout          120;
        include fastcgi_params;
    }

    # ── Uploaded files (storage) ───────────────────────────
    location /storage/ {
        alias /var/www/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static asset caching ───────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    client_max_body_size 21M;
}
