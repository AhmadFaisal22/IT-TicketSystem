services:

  # ── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      # Exposed for LAN DB clients (pgAdmin/DBeaver). Change to
      # "127.0.0.1:5432:5432" if no one connects from other machines.
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-it_helpdesk}
      POSTGRES_USER:     ${DB_USERNAME:-helpdesk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel Backend (PHP-FPM) ─────────────────────────────
  # queue/scheduler reuse this exact image (no build: of their own) so a
  # rebuild of `app` updates all three — otherwise workers keep running
  # old code after a deploy.
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.php
    image: it-helpdesk-php:latest
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - backend_storage:/var/www/backend/storage
    depends_on:
      postgres:
        condition: service_healthy

  # ── Laravel Queue Worker ──────────────────────────────────
  queue:
    image: it-helpdesk-php:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env.docker
    volumes:
      - backend_storage:/var/www/backend/storage
    depends_on:
      postgres:
        condition: service_healthy

  # ── Laravel Scheduler (SLA breach checks, etc.) ───────────
  scheduler:
    image: it-helpdesk-php:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env.docker
    volumes:
      - backend_storage:/var/www/backend/storage
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx + Vue SPA (built inside image) ──────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "8088:80"       # Synology: access via http://NAS-IP:8088
    volumes:
      - backend_storage:/var/www/backend/storage/app/public:ro
    depends_on:
      - app

volumes:
  postgres_data:
  backend_storage:
