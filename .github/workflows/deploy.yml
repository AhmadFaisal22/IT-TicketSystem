# ──────────────────────────────────────────────────────────────────────────────
# Job 4 — Telegram notification
# Reports CI (tests + build) status; deploy is manual until a self-hosted
# runner exists (see disabled Job 3 above).
# Required secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# ──────────────────────────────────────────────────────────────────────────────
  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send CI status to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT_TESTS: ${{ needs.test-backend.result }}
          RESULT_BUILD: ${{ needs.build-frontend.result }}
          COMMIT_SHA:    ${{ github.sha }}
          COMMIT_MSG:    ${{ github.event.head_commit.message }}
          AUTHOR:        ${{ github.actor }}
          REPO:          ${{ github.repository }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$RESULT_TESTS" = "success" ] && [ "$RESULT_BUILD" = "success" ]; then
            EMOJI="✅"
            STATUS="CI PASSED — ready to deploy (run ./deploy.sh on NAS)"
          else
            EMOJI="❌"
            STATUS="CI FAILED (tests: ${RESULT_TESTS}, build: ${RESULT_BUILD})"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Escape special Telegram HTML characters in the commit message
          SAFE_MSG=$(echo "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          # Built with printf so every line of this script stays indented —
          # a flush-left continuation line would terminate the YAML block scalar.
          TEXT=$(printf '%b' "${EMOJI} <b>IT HelpDesk — ${STATUS}</b>\n\n📦 <b>Repo:</b> ${REPO}\n🌿 <b>Branch:</b> main\n👤 <b>Author:</b> ${AUTHOR}\n🔖 <b>Commit:</b> <code>${SHORT_SHA}</code>\n💬 <b>Message:</b> ${SAFE_MSG}\n\n🔗 <a href=\"${RUN_URL}\">View workflow run</a>")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${CHAT_ID}\",
              \"text\": $(echo "$TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"parse_mode\": \"HTML\",
              \"disable_web_page_preview\": true
            }"
