# ─────────────────────────────────────────────────────────────────────────────
# IT HelpDesk & Asset Management — CI / CD Pipeline
# Triggers on every push to `main`.
# Jobs:
#   1. test-backend   — PHPUnit (SQLite in-memory, no server needed)
#   2. build-frontend — vue-tsc + vite build, uploads dist/ artifact
#   3. deploy         — SSH into server, pull code, rebuild Docker, migrate
#   4. notify         — Telegram message with commit details + pass/fail status
# ─────────────────────────────────────────────────────────────────────────────
name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Backend tests
# Uses SQLite :memory: as defined in phpunit.xml — no Postgres credentials needed.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: PHPUnit — Laravel 12
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: it-helpdesk-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, pdo_pgsql, mbstring, openssl, xml, gd, zip, bcmath, intl
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: it-helpdesk-backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('it-helpdesk-backend/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test environment
        run: |
          cp .env.example .env
          # Override only what phpunit.xml does not already set
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          php artisan key:generate --quiet

      - name: Run PHPUnit test suite
        run: php artisan test --stop-on-failure

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Frontend type-check + production build
# ──────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Vue 3 / Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: it-helpdesk-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: it-helpdesk-frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check and build (vue-tsc + vite)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: it-helpdesk-frontend/dist
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — Deploy (only on push to main, skipped on PRs)
# Requires: test-backend and build-frontend both green.
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     22
          # stop-on-error — any command failure aborts the deploy immediately
          script: |
            set -euo pipefail
            cd /volume1/docker/it-helpdesk

            echo "──────────────────────────────────────"
            echo " IT HelpDesk — Production Deploy"
            echo " Commit : ${{ github.sha }}"
            echo " Author : ${{ github.actor }}"
            echo "──────────────────────────────────────"

            # 1. Pull latest code from main
            git fetch --prune origin
            git reset --hard origin/main

            # 2. Rebuild only the app container (keeps postgres/nginx warm)
            docker compose build --no-cache app

            # 3. Bring up updated containers with zero-downtime rolling restart
            docker compose up -d --remove-orphans

            # 4. Wait for the app container to be healthy before running artisan
            TRIES=0
            until docker compose exec -T app php -r "echo 'ok';" 2>/dev/null | grep -q ok; do
              TRIES=$((TRIES+1))
              if [ $TRIES -ge 15 ]; then echo "Container health check timed out"; exit 1; fi
              sleep 2
            done

            # 5. Install/update Composer packages inside container
            docker compose exec -T app composer install \
              --prefer-dist --no-dev --no-progress --no-interaction \
              --optimize-autoloader

            # 6. Run pending migrations (safe — only applies new ones)
            docker compose exec -T app php artisan migrate --force

            # 7. Rebuild Laravel caches
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache

            # 8. Restart queue workers gracefully (finishes current job first)
            docker compose exec -T app php artisan queue:restart

            # 9. Create storage symlink if not already done
            docker compose exec -T app php artisan storage:link --quiet || true

            echo "✅ Deploy complete."

# ──────────────────────────────────────────────────────────────────────────────
# Job 4 — Telegram notification
# Runs ALWAYS after deploy (reports success or failure).
# Required secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# ──────────────────────────────────────────────────────────────────────────────
  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send deployment status to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_SHA:    ${{ github.sha }}
          COMMIT_MSG:    ${{ github.event.head_commit.message }}
          AUTHOR:        ${{ github.actor }}
          REPO:          ${{ github.repository }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            EMOJI="✅"
            STATUS="DEPLOYED"
          else
            EMOJI="❌"
            STATUS="FAILED"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Escape special Telegram HTML characters in the commit message
          SAFE_MSG=$(echo "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          TEXT="${EMOJI} <b>IT HelpDesk — ${STATUS}</b>

📦 <b>Repo:</b> ${REPO}
🌿 <b>Branch:</b> main
👤 <b>Author:</b> ${AUTHOR}
🔖 <b>Commit:</b> <code>${SHORT_SHA}</code>
💬 <b>Message:</b> ${SAFE_MSG}

🔗 <a href=\"${RUN_URL}\">View workflow run</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${CHAT_ID}\",
              \"text\": $(echo "$TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"parse_mode\": \"HTML\",
              \"disable_web_page_preview\": true
            }"
